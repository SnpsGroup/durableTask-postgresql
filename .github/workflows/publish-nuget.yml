name: Build and Publish NuGet

on:
  pull_request:
    branches:
      - main
      - vnext
      - desenv
  push:
    branches:
      - main
      - vnext
      - desenv
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish package to NuGet.org"
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build-pack:
    name: Build and Pack
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore src/DurableTask.PostgreSQL/DurableTask.PostgreSQL.csproj

      - name: Build project
        run: dotnet build src/DurableTask.PostgreSQL/DurableTask.PostgreSQL.csproj --configuration Release --no-restore

      - name: Pack NuGet package
        run: dotnet pack src/DurableTask.PostgreSQL/DurableTask.PostgreSQL.csproj --configuration Release --no-build --output ./artifacts

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: ./artifacts/*
          if-no-files-found: error

  publish:
    name: Publish to NuGet.org
    runs-on: ubuntu-latest
    needs: build-pack
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish)
    permissions:
      id-token: write
      contents: read
    environment: release
    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: ./artifacts

      - name: Validate trusted publishing username secret
        run: |
          if [ -z "${{ secrets.NUGET_ORG_USERNAME }}" ]; then
            echo "Secret NUGET_ORG_USERNAME is required for NuGet/login."
            exit 1
          fi

      - name: NuGet login (OIDC)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_ORG_USERNAME }}

      - name: Push packages to NuGet.org
        run: |
          dotnet nuget push ./artifacts/*.nupkg \
            --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
          dotnet nuget push ./artifacts/*.snupkg \
            --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
